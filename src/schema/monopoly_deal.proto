syntax = "proto3";

package fun_kames.schema.monopoly_deal;

option go_package = "fun-kames/internal/schema/monopoly_deal_schema;monopoly_deal_schema";

message Error {
  string message = 1;
  int32 status = 2;
  string code = 3;
}

message Chat {
  string payload = 1;
}

message ChatReceived {
  string player_id = 1;
  string payload = 2;
}

enum AssetKey {
  ASSET_KEY_UNSPECIFIED = 0;

  ASSET_KEY_BALTIC_AVE = 1;
  ASSET_KEY_MEDITERRANEAN_AVE = 2;
  ASSET_KEY_CONNECTICUT_AVE = 3;
  ASSET_KEY_ORIENTAL_AVE = 4;
  ASSET_KEY_VERMONT_AVE = 5;
  ASSET_KEY_ST_CHARLES_PLACE = 6;
  ASSET_KEY_VIRGINIA_AVE = 7;
  ASSET_KEY_STATES_AVE = 8;
  ASSET_KEY_NEW_YORK_AVE = 9;
  ASSET_KEY_ST_JAMES_PLACE = 10;
  ASSET_KEY_TENNESSEE_AVE = 11;
  ASSET_KEY_KENTUCKY_AVE = 12;
  ASSET_KEY_INDIANA_AVE = 13;
  ASSET_KEY_ILLINOIS_AVE = 14;
  ASSET_KEY_VENTNOR_AVE = 15;
  ASSET_KEY_MARVIN_GARDENS = 16;
  ASSET_KEY_ATLANTIC_AVE = 17;
  ASSET_KEY_NORTH_CAROLINA_AVE = 18;
  ASSET_KEY_PACIFIC_AVE = 19;
  ASSET_KEY_PENNSYLVANIA_AVE = 20;
  ASSET_KEY_BOARDWALK = 21;
  ASSET_KEY_PARK_PLACE = 22;
  ASSET_KEY_WATER_WORKS = 23;
  ASSET_KEY_ELECTRIC_COMPANY = 24;
  ASSET_KEY_SHORT_LINE = 25;
  ASSET_KEY_B_AND_O_RAILROAD = 26;
  ASSET_KEY_READING_RAILROAD = 27;
  ASSET_KEY_PENNSYLVANIA_RAILROAD = 28;

  ASSET_KEY_WILD_BROWN_SKY = 29;
  ASSET_KEY_WILD_SKY_RAILROAD = 30;
  ASSET_KEY_WILD_PINK_ORANGE = 31;
  ASSET_KEY_WILD_RED_YELLOW = 32;
  ASSET_KEY_WILD_GREEN_BLUE = 33;
  ASSET_KEY_WILD_GREEN_RAILROAD = 34;
  ASSET_KEY_WILD_UTILITY_RAILROAD = 35;
  ASSET_KEY_WILD_WILD = 36;

  ASSET_KEY_MONEY_10 = 37;
  ASSET_KEY_MONEY_5 = 38;
  ASSET_KEY_MONEY_4 = 39;
  ASSET_KEY_MONEY_3 = 40;
  ASSET_KEY_MONEY_2 = 41;
  ASSET_KEY_MONEY_1 = 42;

  ASSET_KEY_DEAL_BREAKER = 43;
  ASSET_KEY_JUST_SAY_NO = 44;
  ASSET_KEY_HOTEL = 45;
  ASSET_KEY_DEBT_COLLECTOR = 46;
  ASSET_KEY_FORCED_DEAL = 47;
  ASSET_KEY_SLY_DEAL = 48;
  ASSET_KEY_HOUSE = 49;
  ASSET_KEY_ITS_MY_BIRTHDAY = 50;
  ASSET_KEY_DOUBLE_THE_RENT = 51;
  ASSET_KEY_PASS_GO = 52;

  ASSET_KEY_RENT_WILD = 53;
  ASSET_KEY_RENT_BROWN_SKY = 54;
  ASSET_KEY_RENT_PINK_ORANGE = 55;
  ASSET_KEY_RENT_RED_YELLOW = 56;
  ASSET_KEY_RENT_GREEN_BLUE = 57;
  ASSET_KEY_RENT_UTILITY_RAILROAD = 58;
}

enum Category {
  CATEGORY_UNSPECIFIED = 0;

  CATEGORY_PURE_PROPERTY = 1;
  CATEGORY_WILD_PROPERTY = 2;
  CATEGORY_MONEY = 3;
  CATEGORY_ACTION = 4;
}

enum Color {
  COLOR_UNSPECIFIED = 0;

  COLOR_BROWN = 1;
  COLOR_SKY = 2;
  COLOR_PINK = 3;
  COLOR_ORANGE = 4;
  COLOR_RED = 5;
  COLOR_YELLOW = 6;
  COLOR_GREEN = 7;
  COLOR_BLUE = 8;
  COLOR_UTILITY = 9;
  COLOR_RAILROAD = 10;
}

message Card {
  string card_id = 1;
  AssetKey asset_key = 2;
  Category category = 3;
  Color active_color = 4;
  repeated Color colors = 5;
  int32 value = 6;
}

message Player {
  string player_id = 1;
  string display_name = 2;
  string avatar_url = 3;
  int32 money = 4;
  int32 completed_sets = 5;
  int32 hand_cards = 6;
}

message Hand {
  repeated Card cards = 1;
}

message Money {
  string player_id = 1;
  repeated Card cards = 2;
}

message PropertySet {
  string player_id = 1;
  string property_set_id = 2;
  Color color = 3;
  repeated Card cards = 4;
}

enum DemandKind {
  DEMAND_KIND_UNSPECIFIED = 0;

  DEMAND_KIND_PAYMENT = 1;
  DEMAND_KIND_PROPERTY = 2;
  DEMAND_KIND_PROPERTY_SET = 3;
}

message PaymentDemand {
  int32 amount = 1;
}

message PropertyDemand {
  optional string source_card_id = 1;
  string target_card_id = 2;
}

message PropertySetDemand {
  string property_set_id = 1;
}

message Demand {
  string source_id = 1;
  DemandKind demand_kind = 2;
  oneof demand {
    PaymentDemand payment_demand = 3;
    PropertyDemand property_demand = 4;
    PropertySetDemand property_set_demand = 5;
  }
  bool is_active = 6;
}

message PendingRent {
  string player_id = 1;
  repeated string target_ids = 2;
  int32 base_amount = 3;
  int32 multiplier = 4;
}

message AssetImage {
  AssetKey asset_key = 1;
  string image_url = 2;
}

message GameState {
  int32 seq_num = 1;
  repeated Player players = 2;
  string current_player_id = 3;
  int32 moves_left = 4;
  Hand your_hand = 5;
  repeated Money money = 6;
  repeated PropertySet properties = 7;
  optional Demand demand = 8;
  optional PendingRent pending_rent = 9;
  Card last_action = 10;
  repeated AssetImage asset_images = 11;
}

message StartTurnRes {
  int32 seq_num = 1;
  string player_id = 2;
  repeated Card cards = 3;
  int32 moves_left = 4;
}

message StartTurnMaskedRes {
  int32 seq_num = 1;
  string player_id = 2;
  int32 num_cards = 3;
}

//message DiscardCards {
//  repeated string card_ids = 1;
//}
//
//message DiscardCardsRes {
//  // TODO
//}

message PlayMoney {
  string card_id = 1;
}

message PlayMoneyRes {
  int32 seq_num = 1;
  string player_id = 2;
  Card card = 3;
}

message PlayProperty {
  string card_id = 1;
  optional string property_set_id = 2;
  optional Color active_color = 3;
}

message PlayPropertyRes {
  int32 seq_num = 1;
  string player_id = 2;
  PropertySet property_set = 3;
}

message CompleteTurn {

}

message PlayPassGo {
  string card_id = 1;
}

message PlayPassGoRes {
  int32 seq_num = 1;
  string player_id = 2;
  repeated Card cards = 3;
  Card last_played_card = 4;
}

message PlayPassGoMaskedRes {
  int32 seq_num = 1;
  string player_id = 2;
  int32 num_cards = 3;
  Card last_played_card = 4;
}

message ClientMessage {
  oneof payload {
    Chat chat = 1;
    PlayMoney play_money = 2;
    PlayProperty play_property = 3;
    CompleteTurn complete_turn = 4;
    PlayPassGo play_pass_go = 5;
  }
}

message ServerMessage {
  oneof payload {
    Error error = 1;
    ChatReceived chat_received = 2;
    GameState game_state = 3;
    StartTurnRes start_turn_res = 4;
    StartTurnMaskedRes start_turn_masked_res = 5;
    PlayMoneyRes play_money_res = 6;
    PlayPropertyRes play_property_res = 7;
    PlayPassGoRes play_pass_go_res = 8;
    PlayPassGoMaskedRes play_pass_go_masked_res = 9;
  }
}
