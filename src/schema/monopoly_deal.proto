syntax = "proto3";

package funkames.schema;

option go_package = "funkames/backend/internal/schema;schema";

// gameplay
enum PurePropertyType {
  PURE_PROPERTY_TYPE_BROWN = 0;
  PURE_PROPERTY_TYPE_LIGHT_BLUE = 1;
  PURE_PROPERTY_TYPE_PINK = 2;
  PURE_PROPERTY_TYPE_ORANGE = 3;
  PURE_PROPERTY_TYPE_RED = 4;
  PURE_PROPERTY_TYPE_YELLOW = 5;
  PURE_PROPERTY_TYPE_GREEN = 6;
  PURE_PROPERTY_TYPE_DARK_BLUE = 7;
  PURE_PROPERTY_TYPE_UTILITY = 8;
  PURE_PROPERTY_TYPE_RAILROAD = 9;
}

enum WildPropertyType {
  WILD_PROPERTY_TYPE_WILD_BROWN_LIGHT_BLUE = 0;
  WILD_PROPERTY_TYPE_WILD_LIGHT_BLUE_RAIROAD = 1;
  WILD_PROPERTY_TYPE_WILD_PINK_ORANGE = 2;
  WILD_PROPERTY_TYPE_WILD_ORANGE_UTILITY = 3;
  WILD_PROPERTY_TYPE_WILD_GREEN_DARK_BLUE = 4;
  WILD_PROPERTY_TYPE_WILRD_GREEN_RAILROAD = 5;
  WILD_PROPERTY_TYPE_WILD_UTLITY_RAILROAD = 6;
  WILD_PROPERTY_TYPE_WILD = 7;
}

enum MoneyType {
  MONEY_TYPE_1 = 0;
  MONEY_TYPE_2 = 1;
  MONEY_TYPE_3 = 2;
  MONEY_TYPE_4 = 3;
  MONEY_TYPE_5 = 4;
  MONEY_TYPE_10 = 5;
}

enum ActionType {
  ACTION_TYPE_PASS_GO = 0;
  ACTION_TYPE_DOUBLE_THE_RENT = 1;
  ACTION_TYPE_ITS_MY_BIRTHDAY = 2;
  ACTION_TYPE_HOUSE = 3;
  ACTION_TYPE_SLY_DEAL = 4;
  ACTION_TYPE_FORCED_DEAL = 5;
  ACTION_TYPE_DEBT_COLLECTOR = 6;
  ACTION_TYPE_HOTEL = 7;
  ACTION_TYPE_JUST_SAY_NO = 8;
  ACTION_TYPE_DEAL_BREAKER = 9;
}

enum RentType {
  RENT_TYPE_BROWN_LIGHT_BLUE = 0;
  RENT_TYPE_PINK_ORANGE = 1;
  RENT_TYPE_RED_YELLOW = 2;
  RENT_TYPE_GREEN_DARK_BLUE = 3;
  RENT_TYPE_UTILITY_RAILROAD = 4;
  RENT_TYPE_WILD = 5;
}

message Card {
  oneof card {
    PurePropertyType pure_property = 1;
    WildPropertyType wild_property = 2;
    MoneyType money = 3;
    ActionType action = 4;
    RentType rent = 5;
  }
}

message PropertyType {
  Card card = 1;
  optional string property_name = 2;
}

message PropertySetType {
  repeated PropertyType property_types = 1;
}

message PlayProperty {
  string player_id = 1;
  PropertyType property = 2;
}

message PlayMoney {
  string player_id = 1;
  Card card = 2;
}

// pass go loop
message PassGo {
  string player_id = 1;
}

message PassGoResponse {
  string player_id = 1;
  repeated Card cards = 2;
}

message DoubleTheRent {
  string player_id = 1;
}

// its my birthday loop
message ItsMyBirthday {
  string player_id = 1;
}

message ItsMyBirthdayResponse {
  string player_id = 1;
  repeated Card cards = 2;
  bool said_no = 3;
}

message House {
  string player_id = 1;
  PropertySetType property_set = 2;
}

message SlyDeal {
  string player_id = 1;
  string target_player_id = 2;
  PropertyType property = 3;
}

message SlyDealResponse {
  string player_id = 1;
  bool said_no = 2;
}

message ForcedDeal {
  string player_id = 1;
  string target_player_id = 2;
  PropertyType source_property = 3;
  PropertyType target_property = 4;
}

message ForcedDealResponse {
  string player_id = 1;
  bool said_no = 2;
}

message DebtCollector {
  string player_id = 1;
  string target_player_id = 2;
}

message DebtCollectorResponse {
  string player_id = 1;
  repeated Card cards = 2;
  bool said_no = 3;
}

message Hotel {
  string player_id = 1;
  PropertySetType property_set = 2;
}

message JustSayNoResponse {
  string player_id = 1;
  bool said_no = 2;
}

message DealBreaker {
  string player_id = 1;
  string target_player_id = 2;
  PropertySetType property_set = 3;
}

message DealBreakerResponse {
  string player_id = 1;
  bool said_no = 2;
}

message Rent {
  string player_id = 1;
  Card card = 2;
}

message RentResponse {
  string player_id = 1;
  repeated Card cards = 2;
  bool said_no = 3;
}

// TODO
message WildRent {
  string player_id = 1;
  string target_player_id = 2;
}

message WildRentResponse {
  string player_id = 1;
  repeated Card cards = 2;
  bool said_no = 3;
}

message ClientMonopolyDealMessage {

}

message ServerMonopolyDealMessage {

}

