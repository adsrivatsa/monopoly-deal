syntax = "proto3";

package funkames.schema;

import "monopoly_deal.proto";
import "room.proto";

option go_package = "funkames/backend/internal/schema;schema";

message Ping {
  int64 time_unix_ms = 1;
}

message ClientMessage {
  oneof payload {
    Ping ping = 1;

    ClientRoomMessage room_message = 10;
    ClientMonopolyDealMessage monopoly_deal_message = 11;
  }
}

message ServerMessage {
  oneof payload {
    Ping ping = 1;

    ServerRoomMessage room_message = 10;
    ServerMonopolyDealMessage monopoly_deal_message = 11;
  }
}
