version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/store/query"
    schema: "./internal/migration"
    gen:
      go:
        package: "store"
        out: "./internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        emit_exact_table_names: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "text"
            go_type:
              type: "string"
          - db_type: "int"
            go_type:
              type: "int"
